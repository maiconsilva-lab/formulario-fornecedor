function buildProgressBar(){
  const steps=getStepsForType(tipo);
  const bar=document.getElementById('progBar');
  bar.innerHTML='';
  steps.forEach((s,i)=>{
    const div=document.createElement('div');
    div.className='prog-s';
    div.dataset.step=s;
    div.onclick=()=>tryGo(s);
    div.innerHTML='<span class="sn">'+(i+1)+'</span>'+getStepLabel(s,tipo);
    bar.appendChild(div);
  });
  updateProgressBar();
}

function updateProgressBar(){
  const steps=getStepsForType(tipo);
  document.querySelectorAll('.prog-s').forEach(e=>{
    const s=parseInt(e.dataset.step);
    e.classList.remove('on','done');
    const idx=steps.indexOf(s);
    const curIdx=steps.indexOf(cur);
    if(idx<curIdx)e.classList.add('done');
    if(idx===curIdx)e.classList.add('on');
  });
}

const mCNPJ=v=>v.replace(/\D/g,'').replace(/^(\d{2})(\d)/,'$1.$2').replace(/^(\d{2}\.\d{3})(\d)/,'$1.$2').replace(/\.(\d{3})(\d)/,'.$1/$2').replace(/(\d{4})(\d)/,'$1-$2').substring(0,18);
const mCPF=v=>v.replace(/\D/g,'').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d{1,2})$/,'$1-$2').substring(0,14);
const mTel=v=>{v=v.replace(/\D/g,'');return v.length<=10?v.replace(/(\d{2})(\d)/,'($1) $2').replace(/(\d{4})(\d)/,'$1-$2'):v.replace(/(\d{2})(\d)/,'($1) $2').replace(/(\d{5})(\d)/,'$1-$2')};
const mCEP=v=>v.replace(/\D/g,'').replace(/(\d{5})(\d)/,'$1-$2').substring(0,9);

document.querySelector('[name=cpf]').addEventListener('input',function(){this.value=mCPF(this.value)});
document.querySelector('[name=cpf_mot]').addEventListener('input',function(){this.value=mCPF(this.value)});
document.querySelector('[name=cnpj_cpf_atu]').addEventListener('input',function(){const v=this.value.replace(/\D/g,'');this.value=v.length>11?mCNPJ(v):mCPF(v)});

function getRequired(s){
  const apenasB=document.getElementById('apenasBoleto')?.checked;
  if(s===1){
    if(tipo==='pj')return['razao_social','cnpj','inscricao_estadual'];
    if(tipo==='pf')return['nome_completo','cpf','rg'];
    if(tipo==='motorista')return['nome_completo_mot','cpf_mot','rg_mot','cnh_categoria'];
    if(tipo==='atualizacao_bancaria')return['razao_social_atu','cnpj_cpf_atu'];
  }
  if(s===2)return['responsavel_nome','celular','email'];
  if(s===3)return['cep','logradouro','numero','bairro','cidade','estado'];
  if(s===4){
    if(tipo==='motorista')return[];
    if(apenasB)return[];
    return['banco','agencia','conta','titular_conta','cpf_cnpj_titular'];
  }
  return[];
}

function validateStep(s){
  const sec=document.getElementById('s'+s);
  let ok=true;let firstErr=null;
  const fields=getRequired(s);
  fields.forEach(name=>{
    const f=sec.querySelector('[name="'+name+'"]');
    if(!f)return;
    if(f.closest('.hide'))return;
    const em=f.closest('.fld')?.querySelector('.emsg');
    if(!f.value.trim()){f.classList.add('err');if(em)em.classList.add('show');if(!firstErr)firstErr=f;ok=false}
    else{f.classList.remove('err');if(em)em.classList.remove('show')}
  });
  if(!ok){showToast('⚠️ Preencha todos os campos obrigatórios');if(firstErr)firstErr.focus()}
  return ok;
}

async function buscaCEP(){
  const cep=document.querySelector('[name=cep]').value.replace(/\D/g,'');
  if(cep.length!==8){showToast('Digite um CEP válido');return}
  try{
    const r=await fetch('https://viacep.com.br/ws/'+cep+'/json/');
    const d=await r.json();
    if(d.erro){showToast('CEP não encontrado');return}
    document.querySelector('[name=logradouro]').value=d.logradouro||'';
    document.querySelector('[name=bairro]').value=d.bairro||'';
    document.querySelector('[name=cidade]').value=d.localidade||'';
    const sel=document.querySelector('[name=estado]');
    for(let o of sel.options){if(o.value===d.uf){sel.value=d.uf;break}}
  }catch(e){showToast('Erro ao buscar CEP')}
}

  else blocks.push({title:'🔄 Atualização Bancária',items:[['Razão Social/Nome',data.razao_social_atu],['CNPJ/CPF',data.cnpj_cpf_atu]]});

async function uploadFile(file, folder) {
  const ts = Date.now();
  const ext = file.name.split('.').pop();
  const path = folder + '/' + ts + '_' + Math.random().toString(36).substr(2, 6) + '.' + ext;
  
  const res = await fetch(SB_URL + '/storage/v1/object/comprovantes/' + path, {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': file.type || 'application/octet-stream',
      'x-upsert': 'true'
    },
    body: file
  });

  if (!res.ok) {
    const errText = await res.text();
    throw new Error('Falha ao upar arquivo. ' + errText);
  }
  return SB_URL + '/storage/v1/object/public/comprovantes/' + path;
}

async function enviar() {
  const btn = document.getElementById('sbtn');
  if (!btn) return;

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> ENVIANDO...';

  try {
    const apenasB = document.getElementById('apenasBoleto')?.checked || false;
    const uploads = {};
    const fd = new FormData(document.getElementById('frm'));
    const data = {};

    const skipFiles = ['comprovante_cnpj', 'contrato_social', 'comprovante_bancario', 'comprovante_ie', 'documento_identidade', 'comprovante_bancario_pf', 'documento_identidade_mot', 'comprovante_endereco_mot', 'comprovante_bancario_atu'];
    for (const [k, v] of fd.entries()) {
      if (skipFiles.includes(k)) continue;
      if (v === '' || v === undefined || v === null) continue;
      data[k] = v;
    }

    if (tipo === 'pj') {
      const cnpjF = document.querySelector('[name=comprovante_cnpj]').files[0];
      const csF = document.querySelector('[name=contrato_social]').files[0];
      const bancF = document.querySelector('[name=comprovante_bancario]').files[0];
      const ieF = document.querySelector('[name=comprovante_ie]')?.files[0];

      if (!cnpjF || !csF) throw new Error('Cartão CNPJ e Contrato Social são obrigatórios.');
      if (!apenasB && !bancF) throw new Error('Anexe o comprovante bancário.');

      uploads.comprovante_cnpj_url = await uploadFile(cnpjF, 'cnpj');
      uploads.contrato_social_url = await uploadFile(csF, 'contrato');
      if (bancF) uploads.comprovante_bancario_url = await uploadFile(bancF, 'bancario');
      if (ieF) uploads.comprovante_ie_url = await uploadFile(ieF, 'ie');

    } else if (tipo === 'pf') {
      const docF = document.querySelector('[name=documento_identidade]').files[0];
      const bancF = document.querySelector('[name=comprovante_bancario_pf]').files[0];

      if (!docF) throw new Error('Documento com foto é obrigatório.');
      if (!apenasB && !bancF) throw new Error('Anexe o comprovante bancário.');

      uploads.documento_identidade_url = await uploadFile(docF, 'doc_identidade');
      if (bancF) uploads.comprovante_bancario_url = await uploadFile(bancF, 'bancario');

    } else if (tipo === 'motorista') {
      const docF = document.querySelector('[name=documento_identidade_mot]').files[0];
      const endF = document.querySelector('[name=comprovante_endereco_mot]')?.files[0];

      if (!docF) throw new Error('CNH/Documento com foto é obrigatório.');
      uploads.documento_identidade_url = await uploadFile(docF, 'doc_motorista');
      if (endF) uploads.comprovante_endereco_url = await uploadFile(endF, 'endereco');

    } else if (tipo === 'atualizacao_bancaria') {
      const bancF = document.querySelector('[name=comprovante_bancario_atu]').files[0];
      if (!bancF) throw new Error('O novo comprovante bancário é obrigatório.');
      uploads.comprovante_bancario_url = await uploadFile(bancF, 'bancario_atu');
    }

    if (tipo === 'pf') {
      delete data.cnpj;
      delete data.inscricao_estadual;
      delete data.nome_fantasia;
      delete data.ramo_atividade;
      delete data.produtos_servicos;
    } else if (tipo === 'motorista') {
      if (data.nome_completo_mot) { data.nome_completo = data.nome_completo_mot; delete data.nome_completo_mot; }
      if (data.cpf_mot) { data.cpf = data.cpf_mot; delete data.cpf_mot; }
      if (data.rg_mot) { data.rg = data.rg_mot; delete data.rg_mot; }
      delete data.tipo_conta; delete data.cnpj; delete data.inscricao_estadual;
    } else if (tipo === 'atualizacao_bancaria') {
      if (data.razao_social_atu) { data.razao_social = data.razao_social_atu; delete data.razao_social_atu; }
      if (data.cnpj_cpf_atu) {
        const v = data.cnpj_cpf_atu.replace(/\D/g, '');
        if (v.length > 11) data.cnpj = data.cnpj_cpf_atu;
        else data.cpf = data.cnpj_cpf_atu;
        delete data.cnpj_cpf_atu;
      }
      delete data.tipo_conta;
    }

    if (apenasB && tipo !== 'atualizacao_bancaria') {
      delete data.banco; delete data.agencia; delete data.conta;
      delete data.titular_conta; delete data.cpf_cnpj_titular; delete data.pix; delete data.tipo_conta;
    }

    if (!data.razao_social) data.razao_social = data.nome_completo || data.responsavel_nome || 'Sem nome';
    data.inscricao_estadual_isento = document.getElementById('ieIsento')?.checked || false;
    data.apenas_boleto = (tipo === 'motorista') ? false : apenasB;
    data.status = 'pendente';

    Object.assign(data, uploads);
    Object.keys(data).forEach(k => { 
      if (data[k] === '' || data[k] === null || data[k] === undefined) {
        delete data[k];
      }
    });

    console.log('Pacote pronto para o Supabase:', data);

    const res = await fetch(SB_URL + '/rest/v1/fornecedores', {
      method: 'POST',
      headers: {
        'apikey': SB_KEY,
        'Authorization': 'Bearer ' + SB_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify(data)
    });

    if (!res.ok) {
      const errTexto = await res.text();
      console.error(errTexto);
      throw new Error('Falha no Supabase. Revise os dados informados.');
    }

    document.getElementById('frm').classList.add('hide');
    document.getElementById('progBar').classList.add('hide');
    document.getElementById('typeSel').classList.add('hide');
    document.getElementById('successScreen').classList.add('show');
    
    if (tipo === 'atualizacao_bancaria') {
      document.getElementById('successTitle').textContent = 'Atualização Enviada!';
      document.getElementById('successMsg').textContent = 'Os novos dados bancários foram recebidos. O Núcleo Fiscal Premix irá analisar e atualizar seu cadastro.';
    } else {
      document.getElementById('successTitle').textContent = 'Cadastro Enviado!';
      document.getElementById('successMsg').textContent = 'Seus dados foram recebidos com sucesso. O Núcleo Fiscal Premix irá analisar e entrar em contato em breve.';
    }
    window.scrollTo({ top: 0, behavior: 'smooth' });

  } catch (err) {
    console.error('Erro detectado na função enviar:', err);
    showToast(err.message, 6000);
  } finally {
    if (btn) {
      btn.disabled = false;
      btn.innerHTML = '✓ Confirmar e Enviar';
    }
  }
}
</script>
